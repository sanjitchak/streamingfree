name: Update streaming catalog

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-streaming-catalog
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install official-source indexer
        run: pipx install yt-dlp

      - name: Fetch and verify catalog
        run: node scripts/update-catalog.mjs

      - name: Commit catalog changes
        run: |
          if git diff --quiet -- catalog-data.js; then
            echo "Catalog is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog-data.js
          git commit -m "chore: refresh streaming catalog"
          git push
